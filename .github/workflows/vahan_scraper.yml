name: Vahan Daily Scraper

# Controls when the action will run
on:
  # Runs every day at 6:00 AM IST (00:30 UTC)
  schedule:
    - cron: '30 0 * * *'
  
  # The manual trigger: Allows you to run it whenever you want
  workflow_dispatch:

# Gives the script permission to save the Excel file back to your repo
permissions:
  contents: write

jobs:
  scrape-vahan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pandas openpyxl

      - name: Install Playwright Browsers
        run: playwright install chromium

      - name: Run Scraper Script
        run: python scrape.py

      - name: Commit and Push Excel File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add vahan_raw_latest.xlsx
          
          # This line prevents the script from crashing if the data hasn't changed since yesterday
          git commit -m "Automated update: Vahan Raw Data" || echo "No changes to commit"
          git push
