name: Diagnose Vahan Network Access

# Manual trigger only — click "Run workflow" in the Actions tab.
# Nothing scheduled yet; this is purely to figure out WHERE the
# connection is being blocked before we touch the real scraper.
on:
  workflow_dispatch: {}

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run network diagnostic
        run: python diagnose.py
